<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawBot 平台 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    h1 { text-align: center; margin-bottom: 30px; color: #333; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #666; }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #eee;
      border-radius: 8px;
      font-size: 16px;
    }
    input:focus { outline: none; border-color: #667eea; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    .error { color: #e74c3c; text-align: center; margin-top: 20px; }
    .success { color: #27ae60; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 ClawBot 平台</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="inviteCode">邀请码</label>
        <input type="text" id="inviteCode" placeholder="请输入8位邀请码" maxlength="8" required>
      </div>
      <button type="submit">注册 / 登录</button>
    </form>
    <div id="message"></div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const inviteCode = document.getElementById('inviteCode').value.toUpperCase();
      const messageDiv = document.getElementById('message');

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ inviteCode })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('userId', data.userId);
          messageDiv.innerHTML = `<p class="success">${data.message}</p>`;
          setTimeout(() => window.location.href = '/dashboard.html', 1000);
        } else {
          messageDiv.innerHTML = `<p class="error">${data.error}</p>`;
        }
      } catch (err) {
        messageDiv.innerHTML = `<p class="error">网络错误，请重试</p>`;
      }
    });
  </script>
</body>
</html>
